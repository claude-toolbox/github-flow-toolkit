name: Sync Skills

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch skills from upstream repos
        run: |
          TMP=$(mktemp -d)
          BASE=".claude/plugins/github-flow-toolkit/skills"

          # git-commit, gh-cli from github/awesome-copilot
          git clone --depth 1 https://github.com/github/awesome-copilot.git "$TMP/awesome-copilot"
          mkdir -p "$BASE/git-commit"
          cp "$TMP/awesome-copilot/skills/git-commit/SKILL.md" "$BASE/git-commit/SKILL.md"
          mkdir -p "$BASE/gh-cli"
          cp "$TMP/awesome-copilot/skills/gh-cli/SKILL.md" "$BASE/gh-cli/SKILL.md"

          # pr-creator from google-gemini/gemini-cli
          git clone --depth 1 https://github.com/google-gemini/gemini-cli.git "$TMP/gemini-cli"
          mkdir -p "$BASE/pr-creator"
          cp "$TMP/gemini-cli/.gemini/skills/pr-creator/SKILL.md" "$BASE/pr-creator/SKILL.md"

          # code-review-expert from sanyuan0704/code-review-expert
          git clone --depth 1 https://github.com/sanyuan0704/code-review-expert.git "$TMP/code-review-expert"
          mkdir -p "$BASE/code-review-expert/references"
          cp "$TMP/code-review-expert/skills/code-review-expert/SKILL.md" "$BASE/code-review-expert/SKILL.md"
          cp -R "$TMP/code-review-expert/skills/code-review-expert/references/"* "$BASE/code-review-expert/references/"

          # github-actions-docs from xixu-me/skills
          git clone --depth 1 https://github.com/xixu-me/skills.git "$TMP/xixu-me-skills"
          mkdir -p "$BASE/github-actions-docs/references"
          cp "$TMP/xixu-me-skills/skills/github-actions-docs/SKILL.md" "$BASE/github-actions-docs/SKILL.md"
          cp -R "$TMP/xixu-me-skills/skills/github-actions-docs/references/"* "$BASE/github-actions-docs/references/"

          rm -rf "$TMP"
          echo "All skills synced."

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/plugins/github-flow-toolkit/skills/
          git commit -m "chore(skills): sync skills from upstream"
          git push
